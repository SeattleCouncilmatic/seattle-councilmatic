services:
  app:
    build: .
    container_name: seattle_councilmatic
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      DJANGO_MANAGEPY_MIGRATE: "on"
    volumes:
      - .:/app
    ports:
      - 8000:8000
    entrypoint: /app/docker-entrypoint.sh
    command: python manage.py runserver 0.0.0.0:8000

  postgres:
    container_name: seattle_postgres
    image: postgis/postgis:14-3.2
    platform: linux/amd64
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    environment:
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - seattle_postgres_data:/var/lib/postgresql/data
    ports:
      - 32006:5432

  frontend:
    build: ./frontend
    volumes:
      - ./frontend:/app
      - /app/node_modules
    ports:
      - "5173:5173"

  scheduler:
    build: .
    container_name: seattle_scheduler
    depends_on:
      postgres:
        condition: service_healthy
    env_file:
      - .env
    environment:
      # Cron schedule is interpreted as Seattle local — DST is handled
      # automatically. Other containers stay in UTC.
      TZ: America/Los_Angeles
    volumes:
      - .:/app
      - seattle_cron_logs:/var/log/cron
    command: sh /app/scripts/scheduler-entrypoint.sh

volumes:
  seattle_postgres_data:
  seattle_cron_logs:
