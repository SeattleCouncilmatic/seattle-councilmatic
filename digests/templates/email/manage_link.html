{% comment %}
Email HTML: table-free but fully inline-styled — email clients ignore
<style> blocks inconsistently, so every style is on the element.
{% endcomment %}<div style="margin:0; padding:24px 16px; background:#f4f6f9; font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif; color:#1c2733;">
  <div style="max-width:520px; margin:0 auto; background:#ffffff; border:1px solid #d9dee6; border-radius:8px; padding:28px;">
    <p style="margin:0 0 4px; font-size:14px; font-weight:600; color:#14284b;">Seattle Councilmatic</p>
    <h1 style="margin:0 0 16px; font-size:20px; line-height:1.3;">Manage your digest preferences</h1>
    <p style="margin:0 0 16px; font-size:15px; line-height:1.55;">
      You (or someone with your email address) asked for a link to manage
      your digest preferences — topics, councilmembers, district, cadence,
      or unsubscribing.
    </p>
    <p style="margin:0 0 20px;">
      <a href="{{ manage_url }}" style="display:inline-block; background:#14508c; color:#ffffff; text-decoration:none; border-radius:6px; padding:10px 20px; font-size:15px;">Manage preferences</a>
    </p>
    <p style="margin:0 0 16px; font-size:13px; line-height:1.5; color:#55636f;">
      Or paste this link into your browser:<br>
      <a href="{{ manage_url }}" style="color:#14508c; word-break:break-all;">{{ manage_url }}</a>
    </p>
    <p style="margin:0; font-size:13px; line-height:1.5; color:#55636f;">
      If you didn't request this, you can safely ignore it — the link only
      works for your own subscription, and nothing has changed.
    </p>
  </div>
  <p style="max-width:520px; margin:12px auto 0; font-size:12px; color:#55636f; text-align:center;">
    Seattle Councilmatic — an independent, open-source window into the
    Seattle City Council.
  </p>
</div>
